services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: budgeting-backend:latest
    container_name: budgeting-backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      HOST: "${HOST:-0.0.0.0}"
      PORT: "${PORT:-4000}"
      DATA_FILE: "${DATA_FILE:-/app/backend/data/budgeting.json}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      CORS_ORIGIN: "${CORS_ORIGIN:-*}"
      LBP_PER_USD: "${LBP_PER_USD:-89500}"
    ports:
      - "${HOST_PORT:-4000}:${PORT:-4000}"
    volumes:
      - backend-data:/app/backend/data

volumes:
  backend-data:
